# Supabase local development (opcional).
# Gerado para versionar migrations; use `supabase link` para conectar ao projeto remoto.

project_id = "lista-de-tarefas"

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "https://lista-de-tarefas-taupe-six.vercel.app"]
